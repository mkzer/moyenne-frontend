<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Admin – Statistiques Moyennes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #2e2e2e;
            color: #f1f1f1;
            margin: 0;
        }

        header {
            padding: 1rem;
            background: #3c3c3c;
            display: flex;
            justify-content: space-between;
        }

        main {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        select,
        input,
        button {
            padding: .5rem;
            font-size: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th,
        td {
            border: 1px solid #555;
            padding: .5rem;
            text-align: center;
        }

        th {
            background: #3c3c3c;
        }

        canvas {
            max-width: 600px;
            margin-top: 2rem;
            background: #fff;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <header>
        <h1>🔒 Espace Admin</h1>
        <button id="logoutBtn">Déconnexion</button>
    </header>
    <main>
        <div class="form-group">
            <label>Parcours :
                <select id="selectParcours">
                    <option value="">-- Sélectionner --</option>
                    <option value="M1 EEA MTI">M1 EEA MTI</option>
                    <option value="M1 EEA ISHM">M1 EEA ISHM</option>
                    <option value="M1 EEA IMEEN">M1 EEA IMEEN</option>
                </select>
            </label>
        </div>

        <div class="form-group">
            <label><input type="radio" name="type" value="general" checked id="typeGeneral"> Classement général</label>
            <label><input type="radio" name="type" value="ue" id="typeUE"> Classement UE</label>
        </div>

        <div class="form-group" id="ue-group" style="display:none;">
            <label>Code UE :
                <input type="text" id="selectUE" placeholder="ex : 871.1">
            </label>
        </div>

        <button id="btnAfficher">Afficher classement</button>

        <table id="tblClassement">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Valeur</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <canvas id="histogramme"></canvas>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
